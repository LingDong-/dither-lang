      background: rgba(0,255,255,0.3);
    }

      border: 1px solid orchid;
      border-top:none;
    }

      position: absolute;
      right: 0px;
      top: 0.5px;
      height: 100%;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    .bp-marker::after {
      content: "";
      width: 8px;
      height: 8px;
      background: orchid;
      border-radius: 50%;
    }
    .bp-overline {
      position: relative;
    }
    .bp-overline::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      border-top: 1px solid orchid;
    }

  <script>

const fs = require('fs');
const path = require('path');
const child_process = require('child_process');

if (process.env.PWD && fs.existsSync(process.env.PWD)) {
  process.chdir(process.env.PWD);
}else{
  process.chdir("../../");
}

var API=JSON.parse(fs.readFileSync("doc/api.json").toString());

eval(fs.readFileSync("src/parser.js").toString());

CodeMirror.defineSimpleMode("dither", {
    meta:{
      lineComment: "//",
      comment: "//",
    },
    doubleString: [
      { regex: /[^%"\\]+/, token: "string" },         
      { regex: /\\./, token: "string-2" },            
      { regex: /%\{[^}]*\}/, token: "string-2" },         
      { regex: /"/, token: "string", next: "start" }, 
      { regex: /%/, token: "string" },                
    ],
    singleString: [
      { regex: /[^'\\]+/, token: "string" },
      { regex: /\\./, token: "string-2" },
      { regex: /'/, token: "string", next: "start" },
    ],
    start: [
      // {regex: /"(?:[^\\]|\\.)*?(?:"|$)/mi, token: "string"},
      { regex: /"/, token: "string", next: "doubleString" },
      { regex: /'/, token: "string", next: "singleString" },
      {regex: /(?:namespace|continue|typedef|include|return|break|while|const|else|func|for|if|do|as|is|embed)\b/,
        token: "keyword"},
      {regex: /(?:i8|u8|i16|u16|i32|u32|i64|u64|f32|f64|tup|list|vec|arr|dict|str|func)\b/,
        token: "type"},
      {regex: /0x[a-f\d]+|[-+]?(?:\.\d+|\d+\.?\d*)(?:e[-+]?\d+)?/i,
        token: "number"},
      {regex: /\/\*.*?\*\//, token: "comment"},
      {regex: /\/\/.*/, token: "comment"},
      {regex: /[\{\[\(]/, indent: true, token: "bracket"},
      {regex: /[\}\]\)]/, dedent: true, token: "bracket"},
      {regex: /\.(\b[A-Za-z_$][\w$]*)/, token: "property"},
      {regex: /\@[A-Za-z$][\w$]*/, token: "type"},
      {regex: /[-+\/*=<>!\?\&\|\^\%\~\#\:\;\,\.]/, token: "operator"},
      {regex: /[A-Za-z$][\w$]*/, token: "variable"},
    ],
  });

CodeMirror.defineSimpleMode("dsm", {
  start: [
    {regex: /(?:mov|cast|bnot|lnot|decl|argr|argw|alloc|call|jeqz|fpak|cap|ret|ccall|rcall|jmp|incl|add|sub|mul|div|mod|pow|shl|shr|bor|xor|band|gt|lt|geq|leq|eq|neq|matmul|nop|bloc|end|utag|eoir|dcap)\b/,
      token: "keyword"},
    {regex: /(?:i8|i08|u8|u08|i16|u16|i32|u32|i64|u64|f32|f64|tup|list|vec|lst|arr|dict|dic|str|func|fun|void|union)\b/i,
      token: "type"},
  ],
});

let extensions = {fragment:embed_glsl_frag,'gui/layout':embed_gui_layout,'gui/sync':embed_gui_sync}

document.getElementById("btn-compile").onclick = function(){
  CMR.innerHTML = "";

  let pro = Object.assign({},process);
  pro = Object.assign(pro,{
    exit: function(){
      throw 'up';
    }
  });
  let parser = new PARSER({fs,path,process:pro,search_paths:['']},extensions);

  fs.writeFileSync("/tmp/source.dh",CML.getValue());
  
  let olderror = console.error;
  console.error=(x)=>{
    let div = document.createElement("div");
    div.innerHTML = x;
    CMR.appendChild(div);
  }
  
  let bad = 0;
  try{
    let toks = parser.tokenize("/tmp/source.dh");

    let cst = parser.parse(toks);

    let ast = parser.abstract(cst);

    let scopes = parser.infertypes(ast);
    let [instrs,layout] = parser.compile(ast,scopes);

    let irtxt = parser.writeir(instrs);
    let lotxt = parser.writelayout(layout);

    let irlo = irtxt+lotxt;

    fs.writeFileSync("build/ir.dsm",irlo);

    CMR.innerHTML = irlo;
  }catch(e){
    bad = 1;
  }
  console.error = olderror;
  return bad;
}

let childProcess = null;
let popupWindow = null;

function putmsg(txt){
  let div = document.createElement("div");
  div.innerHTML = `[editor] ${txt}\n`;
  CMR.appendChild(div);
  // div.scrollIntoView();
  CMR.scrollTop = CMR.scrollHeight; 
}
function putout(txt){
  let ps = txt.split('\n');
  for (let i = 0; i < ps.length; i++){
    let span;
    if (ps[i].length){
      span = document.createElement("span");
      span.innerHTML = ps[i];
      CMR.appendChild(span);
    }
    if (i == ps.length-1){
      // if (span) span.scrollIntoView();
      CMR.scrollTop = CMR.scrollHeight; 
    }else{
      CMR.appendChild(document.createElement("br"));
    }
  }
}

function runbin(pth, args=[]){
  if (childProcess){
    childProcess.kill('SIGKILL');
    childProcess = null;
  }
  let firsttime = 1;
  
  putmsg(`invoking subprocess...`);

  let buf = "";
  childProcess = child_process.spawn(pth, args, {env: { ...process.env}});
  childProcess.stdout.on('data', (data) => {
    if (firsttime){
      firsttime = 0;
    }
    let txt = data.toString();
    // txt = txt.replace(/\x1B/g, '$@$');
    txt = txt.replace(/\x1B\[[0-9;]*[mK]/g, '');
    txt = txt.replace(/\0/g, '');

    putout(txt);

    buf += txt;
    if (buf.includes(`[info] serving `)){
      let addr = buf.match(/http:\/\/localhost:\d\d\d\d/g)[0];
      buf = "";
      if (addr){
        if (popupWindow && !popupWindow.closed){  
        }else{
          popupWindow = window.open(addr);
        }
        popupWindow.location.href = addr;
        popupWindow.focus();
      }
    }
  });
  childProcess.stderr.on('data', (data) => {
    console.error(`stderr: ${data.toString()}`);
  });
  childProcess.on('close', (code, signal) => {
    let reason = `code ${code}`;
    if (code === null){
      reason = `signal ${signal}`;
    }
    putmsg(`subprocess exited with ${reason}.`);
    childProcess = null;
  });
}

let dbgsigpause = 0;
let bp_widget = null;
let bp_mark = null;
let bp_line = -1;
let bp_addr = null;

function set_mb_dbg(){
  if (dbgready == 1){
    document.getElementById("mb-dbg").style.opacity = 1;
    document.getElementById("mb-dbg").style.pointerEvents = "auto";
  }else{
    document.getElementById("mb-dbg").style.opacity = 0.333;
    document.getElementById("mb-dbg").style.pointerEvents = "none";
  }
  if (dbgready == 20 || dbgready == 21 || dbgready == 22){
    document.getElementById("mb-ddbg").style.opacity = 1;
    document.getElementById("mb-ddbg").style.pointerEvents = "auto";
  }else{
    document.getElementById("mb-ddbg").style.opacity = 0.333;
    document.getElementById("mb-ddbg").style.pointerEvents = "none";
  }
}
set_mb_dbg();

function parse_ins_print(txt){
  txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
  // txt = txt.replace(/\x1b\[[0-9;]*[mK]/g, '');
  txt = txt.replace(/\0/g, '');
  let lines = txt.split("\n");
  for (let i = lines.length-1; i > 0; i--){
    // let re = /[a-f0-9]{1,16} \(\d+:\d+\)\t.*/gm;
    let re = /[a-f0-9]{1,16} \x1b\[2m\(\d+:\d+\)\x1b\[0m\t.*/gm;
    if (re.test(lines[i])){
      continue;
    }else{
      lines[i-1] += '\n'+lines[i];
      lines.splice(i,1);
    }
  }
  let out = {};
  for (let i = 0; i < lines.length; i++){
    let words = lines[i].split(' ');
    let addr = words[0];
    let loc = words[1].split(')')[0].split('(')[1].split(':').map(x=>Number(x));
    let ins = lines[i].split('\t').slice(1)//.filter(x=>x.length);
    ins = ins.map(ansi_color);
    out[addr] = [loc,ins];
  }
  return out;
}

function ansi_color(txt){
  let cmap = {
    "2" : "#777",
    "31": "#d66",//red
    "32": "#ded",//green
    "33": "#ffb",//yellow
    "34": "#1bf",//blue
    "35": "#b9f",//magenta
    "36": "#6fdfcf",//cyan
  }
  let state = 0;
  txt = txt.replace(/\x1b\[(\d+)m/g, function(m,n){
    let o = `<span style="color:${cmap[n]}">`;
    if (n == "0"){
      return `</span>`;
      state = 0;
    }else if (state == 0){
      state = 1;
      return o;
    }else{
      return `</span>`+o;
    }
  });
  if (state == 1){
    txt += `</span>`;
  }
  return txt;
}

function parse_vars_print(txt){
  txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
  txt = txt.replace(/\x1b\[[0-9;]*[mK]/g, '');
  // txt = txt.replace(/\n/g, '</td></tr><tr><td>');
  // txt = txt.replace(/\t/g, '</td><td>');
  // txt = `<table><tr><td>`+txt+`</td></tr></table>`
  let splits = [
    "===============BEGIN===============",
    "================END================",
    "-----------------------------------"
  ]
  let lines = txt.split('\n').filter(x=>x.length);
  let hd = `<table style="font-size:12px;width:100%;border:1px solid #999;${lines.length?"border-collapse:collapse;":""}">`;
  let out = `<div style="font-size:12px;font-weight:bold;color:#999">VARIABLES</div>`+hd;
  
  for (let i = lines.length-1; i > 0; i--){
    if (splits.includes(lines[i]) || lines[i].split('\t').length >= 4){
      continue;
    }else{
      lines[i-1] += '\n'+lines[i];
      lines.splice(i,1);
    }
  }
  for (let i = 0; i < lines.length; i++){
    if (splits.includes(lines[i])){
      if (lines[i] == splits[2]){
        out += `</table>`+`<div style="font-size:12px;font-weight:bold;color:#999">FRAME BOUNDARY</div>`+hd;
      }
      continue;
    }
    let cells = lines[i].split('\t');
    out += `<tr>`;
    out += `<td style="color:#ded;border:1px solid #999">${cells[0]}</td>`;
    out += `<td style="color:#1bf;border:1px solid #999">${cells[1]}</td>`;
    out += `<td style="color:#b9f;border:1px solid #999">${cells.slice(3).join('\t')}</td>`;
    out += `</tr>`;
  }
  out += `</table>`;
  CMV.innerHTML = out;
  CMV.scrollTop = CMV.scrollHeight; 
}

function unmark_bp(){
  if (bp_line != -1){
    CML.removeLineClass(bp_line, "wrap", "bp-overline")
    bp_line = -1;
  }
  if (bp_widget) {
    bp_widget.clear();
    bp_widget = null;
  }
  if (bp_mark) {
    bp_mark.clear();
    bp_mark = null;
  }
}

function mark_bp({line,ch}) {
  unmark_bp();
  const el = document.createElement("div");
  el.className = "bp-marker";
  bp_widget = CML.addLineWidget(line, el, {
    above: true,
    noHScroll: true,
    coverGutter: false
  });
  bp_mark = CML.markText({line,ch}, {line,ch:ch+1}, {
    className: "bp-hl"
  });
  bp_line = line;
  CML.addLineClass(line, "wrap", "bp-overline")
}

function clean_dbg_hl(){
  if (prvhline != -1){
    CML.removeLineClass(prvhline, "background", "dbg-hl");
    prvhline = -1;
  }
  if (prvmark !== null){
    prvmark.clear();
    prvmark = null;
  }
}

function render_ins(){
  let out = `<table>`;
  for (let k in curinsmap){
    let loc = curinsmap[k][0];
    out += `<tr id="${k}" style="${loc[0]?"opacity:0.5":""}">`;
    for (let i = 0; i < curinsmap[k][1].length; i++){
      let a = curinsmap[k][1][i];
      out += `<td colspan="${Math.ceil(a.replace(/<[^>]+>/g, '').length/8)}" style="${(i==0)?"color:#f6a":""}">${a}</td>`;
    }
    out += `</tr>`;
  }
  out += `</table>`;
  CMI.innerHTML = out;
}

let prvinstr = null;
function hl_ins(addr){
  if (prvinstr){
    prvinstr.classList.remove("dbg-hl");
    prvinstr = null;
  }
  let tr = document.getElementById(addr);
  tr.classList.add("dbg-hl");
  tr.scrollIntoView();
  prvinstr = tr;
}
function unhl_ins(){
  if (prvinstr){
    prvinstr.classList.remove("dbg-hl");
    prvinstr = null;
  }
}

function rundbg(pth, args=[]){
  dbgready = 10;
  set_mb_dbg();

  let firsttime = 1;
  putmsg(`invoking subprocess...`);

  childProcess = child_process.spawn(pth, args, {
    env: { ...process.env},
    stdio: 'pipe'
  });
  let buf = "";
  childProcess.stdout.on('data', (data)=>{
    let txt = data.toString();
    buf += txt;
    console.log(txt);
    if (dbgready == 20 || dbgready == 30 || dbgready == 0){
      txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
      putout(txt);
    }

    if (buf.includes('\x1b[94mdbg>\x1b[0m')){
      if (dbgready == 10){
        childProcess.stdin.write("list\n");
        dbgready = 11;
      }else if (dbgready == 11){
        // console.log(buf);
        curinsmap = parse_ins_print(buf);
        // console.log(curinsmap);
        render_ins();
        parse_vars_print("");
        childProcess.stdin.write("peek\n");
        dbgready = 32;
      }else if (dbgready == 20 || dbgready == 30){
        childProcess.stdin.write("dump\n");
        dbgready ++;
      }else if (dbgready == 21 || dbgready == 31){
        parse_vars_print(buf);
        childProcess.stdin.write("peek\n");
        dbgready ++;
      }else if (dbgready == 22 || dbgready == 32){
        // console.log(buf);
        let im = parse_ins_print(buf);
        let loc = Object.values(im)[0][0];
        let addr = Object.keys(im)[0];
        if (loc[0] == 0){
          let {line,ch} = CML.posFromIndex(loc[1]);
          hl_ins(addr);
          clean_dbg_hl();
          CML.addLineClass(line,"background","dbg-hl");
          prvmark = CML.markText({line,ch}, {line,ch:ch+1}, {
            className: "dbg-hhl"
          });
          CML.scrollIntoView({line,ch});
          prvhline = line;
          if (dbgready == 22){
            if (dbgsigpause == 1){
              dbgsigpause = 0;
              dbgready = 1;
            }else{
              if (addr == bp_addr){
                dbgready = 1;
              }else{
                childProcess.stdin.write("step\n");
                dbgready = 20;
              }
            }
          }else{
            dbgready = 1;
            if (firsttime){
              firsttime = 0;
              putmsg(`debugger session ready.`);
            }
          }
        }else{
          childProcess.stdin.write("step\n");
          dbgready-=2;
        }
        
      }else if (dbgready == 0){
        dbgready = 1;
      }

      buf = "";
      set_mb_dbg();
    }
  })
  childProcess.on('close', (code, signal) => {
    let reason = `code ${code}`;
    if (code === null){
      reason = `signal ${signal}`;
    }
    putmsg(`subprocess exited with ${reason}.`);
    clean_dbg_hl();
    unmark_bp();
    unhl_ins();
    dbgready = 0;
    set_mb_dbg();
    bp_addr = 0;
    childProcess = null;
  });
}

document.getElementById("btn-step").onclick = function(){
  childProcess.stdin.write("step\n");
  dbgready = 30;
}
document.getElementById("btn-faststep").onclick = function(){
  childProcess.stdin.write("step\n");
  dbgready = 20;
}
document.getElementById("btn-continue").onclick = function(){
  childProcess.stdin.write("go\n");
  dbgready = 30;
  set_mb_dbg();
  clean_dbg_hl();
}
document.getElementById("btn-pause").onclick = function(){
  dbgsigpause = 1;
}

document.getElementById("btn-break").onclick = function(){
  if (bp_addr){
    unmark_bp();
    childProcess.stdin.write(`break 0\n`);
    putmsg(`breakpoint removed.`);
    bp_addr = null;
    dbgready = 0;
    return;
  }
  let {line,ch} = CML.getCursor();
  let idx = CML.indexFromPos({line,ch});
  let md = Infinity;
  let addr = null;
  let bidx = null;
  for (let k in curinsmap){
    let loc = curinsmap[k][0];
    if (loc[0] != 0) continue;
    let d = Math.abs(loc[1]-idx);
    if (d < md){
      md = d;
      bidx = loc[1];
      addr = k;
    }
  }
  if (addr == null){
    putmsg(`breakpoint insertion failed.`);
    dbgready = 0;
    return;
  }
  mark_bp(CML.posFromIndex(bidx));
  childProcess.stdin.write(`break ${addr}\n`);
  putmsg(`breakpoint inserted.`);
  dbgready = 0;
  bp_addr = addr;
}

document.getElementById("btn-run").onclick = function(){
  document.getElementById("btn-stop").onclick();
  fs.writeFileSync("/tmp/source.dh",CML.getValue());
  let mode = document.getElementById("sel-mode").value;
  CMR.innerHTML = "";
  if (mode == 'dbg'){
    rundbg('build/dither',['-xvt',mode,'/tmp/source.dh']);
  }else{
    runbin('build/dither',['-xvt',mode,'/tmp/source.dh']);
  }
}

document.getElementById("btn-stop").onclick = function(){
  clean_dbg_hl();
  if (childProcess){
    childProcess.stdout.removeAllListeners('data');
    childProcess.stdout.destroy();
    childProcess.kill('SIGKILL');
    childProcess = null;
  }
}


CodeMirror.registerHelper("lint", "dither", function(str, options) {
  let found = [];

  let pro = Object.assign({},process);
  pro = Object.assign(pro,{
    exit: function(){
      throw 'up';
    }
  });
  let parser = new PARSER({fs,path,process:pro,search_paths:['']},extensions);

  fs.writeFileSync("/tmp/lint.dh",CML.getValue());

  let olderror = console.error;
  let eidx = 0;
  console.error = function(s){
    if (!eidx){
      let [err,loc] = s.split(` at file "/tmp/lint.dh" line `);
      if (err.length && loc.length){
        if (err.includes(`error] `)){
          err = err.split('error] ').slice(1).join('error] ');
        }
        let [ln,col] = loc.split(" column ").map(x=>Number(x));
        found.push({
          from: CodeMirror.Pos(ln-1,col-1),
          to: CodeMirror.Pos(ln-1,col+80),
          message: err,
          severity : "error"
        });
      }
    }
    eidx = (eidx+1)%3;
  }
  try{
    let toks = parser.tokenize("/tmp/lint.dh");
    let cst = parser.parse(toks);
    let ast = parser.abstract(cst);
    let scopes = parser.infertypes(ast);
  }catch(e){
    
  }
  console.error = olderror;
  return found;
});

function get_completions(prefix, before){
  // console.log(prefix,"|",before);
  let list = [];
  for (let k in API){
    let nmsp = k.split('-')[0];
    let name = k.split('-').slice(1).join('.');
    let tem;
    let sig;
    let com=nmsp;
    if (name){
      [name,tem,sig] = name.split(':');
      com += "."+name;
    }
    let arg;
    if (sig){
      sig = sig.replace(/\(/g,'[')
      sig = sig.replace(/\)/g,']')
      tem = tem.split("*");
      arg = sig.split("*");
    }
    let doc = `<i>`+API[k][0]+`</i>`;
    if (arg && arg.length){
      doc += `<table style="font-size: 13px; color:white">`;
      for (let i = 0; i < arg.length; i++){
        doc += `<tr style="vertical-align: top;"><td style="vertical-align: top;min-width:50px;color:#1bf;font-family:monospace">${arg[i]}</td><td style="vertical-align: top;">${API[k][1+i]}</td></tr>`
      }
      if (API[k][arg.length+1]){
        doc += `<tr style="vertical-align: top;"><td style="vertical-align: top;min-width:50px;color:#aaa;font-family:monospace">returns</td><td style="vertical-align: top;">${API[k].at(-1)}</td></tr>`
      }
      doc += `</table>`;
    }
    if (prefix.startsWith('.') && name){
      if (before.endsWith(nmsp) && name.startsWith(prefix.slice(1))){
        list.push({text:'.'+name, displayText:name, doc});
      }
    }else if (nmsp.startsWith(prefix) && prefix.length > 0){
      list.push({text:com, displayText:com, doc});
    }
  }
  return list;
}

CodeMirror.registerHelper("hint", "dither", function(cm) {
  const cursor = cm.getCursor();
  const token = cm.getTokenAt(cursor);
  const line = cm.getLine(cursor.line);
  const before = line.slice(0, cursor.ch);
  let prefix = token.string.trim();
  let from = CodeMirror.Pos(cursor.line, token.start);
  let to   = CodeMirror.Pos(cursor.line, cursor.ch);
  let list = get_completions(prefix,before.slice(0,-prefix.length));
  return { list, from, to };
});

CML.on("inputRead", function(cm, change) {
  if (!cm.state.completionActive && change.text[0]) {
    trigger_completion(cm);
  }
});

let docBox = null;
let docAnimationFrame = null;
function trigger_completion(cm) {
  cm.showHint({ hint: CodeMirror.hint.dither, completeSingle:false });
  if (!docBox) {
    docBox = document.createElement("div");
    docBox.style = `
      position: absolute;
      padding: 5px;
      max-width: 300px;
      border: 1px solid #666;
      background: #333;
      font-size: 13px;
      color: white;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      z-index: 3000;
      font-family: sans-serif;
      border-radius: 3px;
    `;
    document.body.appendChild(docBox);
  }
  function updateDoc() {
    const widget = CML.state.completionActive;
    if (!widget) {
      if (docBox) docBox.style.display = "none";
      docAnimationFrame = null;
      return;
    }
    if (!widget.widget){
      if (docBox) docBox.style.display = "none";
      docAnimationFrame = requestAnimationFrame(updateDoc);
      return;
    }
    const selectedIndex = widget.widget.selectedHint;
    if (selectedIndex == null) return;
    const hintData = widget.data.list[selectedIndex];
    if (!hintData || !hintData.doc) {
      docBox.style.display = "none";
      return;
    }
    docBox.style.display = "block";
    docBox.innerHTML = hintData.doc;
    const rect = widget.widget.hints.getBoundingClientRect();
    docBox.style.left = rect.right + 4 + "px";
    docBox.style.top  = rect.top + "px";
    docAnimationFrame = requestAnimationFrame(updateDoc);
  }

  if (!docAnimationFrame) updateDoc();
  CML.on("endCompletion", function cleanup() {
    if (docBox) {
      docBox.remove();
      docBox = null;
    }
    if (docAnimationFrame) {
      cancelAnimationFrame(docAnimationFrame);
      docAnimationFrame = null;
    }
    CML.off("endCompletion", cleanup);
  });
}
