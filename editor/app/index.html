<!DOCTYPE html>

  <title>Sketchpad</title>
  <style>
    html{
      height:100%;
      overflow:hidden;
    }
    select {
      appearance: none;
      -webkit-appearance: none;
      display: inline-block;
      padding-left: 4px;
      font-size:13px;
      background: #555 url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23222'/%3E%3C/svg%3E") no-repeat right 8px center;
      background-size: 10px 6px;
      border-radius:  2px;
    }
    ::-webkit-scrollbar {
      width: 8px; 
      height: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.3);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-corner {
      background: #252627;
    }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.3) transparent;
    }
    .bigbtn{
      display: inline-block; 
      width: 24px; 
      height: 24px; 
      text-align: center; 
      background: #555;
      margin: 3px;
      margin-right: 0px;
      cursor: pointer;
      border-radius: 2px;
      position: relative;
      z-index: 100000;
    }
    .bigbtn:hover{
      background: #888;
    }
    .tooltip {
      color:#AAA;
      position: absolute;
      z-index: 10000;
      left: 0%;
      top: 100%;
      padding: 2px;
      font-family: sans-serif;
      background: rgba(0,0,0,.5);
      font-size: 12px;
      border: 1px solid #555;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }
    .bigbtn:hover .tooltip {
      opacity: 1;
    }
    .tabbtn {
      width:96px;height:16px;
      color:black;
      font-family:sans-serif;font-size:12px;
      border-radius: 3px 3px 0px 0px;
      text-align: center;
      padding-top:1px;
      cursor:pointer;
      font-weight: bold;
      user-select: none;
      -webkit-user-select: none;
    }
    .tdbtn {
      padding-right: 16px;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'%3E%3Cpath d='M2 10 L10 2 M4 2 H10 V8' fill='none' stroke='%23ded'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 4px center;
      background-size: 10px 10px;
      cursor: pointer;
    }
    .tdbtn:hover{
      background-color: rgba(255,255,255,0.3);
    }
    .hover-underline:hover{
      text-decoration: underline;
    }
    .dbg-hl {
      background: rgba(0,255,255,0.2);
    }
    .dbg-hhl {
      background: rgba(0,255,255,0.3);
    }
    .bp-hl {
      border: 1px solid orchid;
      border-top:none;
    }
    .bp-marker {
      position: absolute;
      right: 0px;
      top: 0.5px;
      height: 100%;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    .bp-marker::after {
      content: "";
      width: 8px;
      height: 8px;
      background: orchid;
      border-radius: 50%;
    }
    .bp-overline {
      position: relative;
    }
    .bp-overline::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      border-top: 1px solid orchid;
    }
    .log{
      overflow:scroll;white-space:nowrap;
      font-family:Menlo, monospace; font-size:13px;
      background-color: #252627!important;
      color: #ded !important;
      filter: saturate(80%) hue-rotate(10deg);
    }
  </style>

async function exec_1off(pth,args){
  console.log(pth,args);
  return new Promise((resolve,reject)=>{
    let cp = child_process.spawn(pth,args);
    let buf = "";
    cp.stdout.on('data',function(x){
      buf += x.toString();
    })
    cp.stderr.on('data',function(x){
      console.error(x.toString());
    })
    cp.on('close',(code)=>{
      if (code){
        reject(code);
      }else{
        resolve(buf);
      }
    })
  })
}

function isAtBottom(div, threshold = 5) {
  return div.scrollHeight - div.scrollTop - div.clientHeight <= threshold;
}

function putmsg(txt,par=CMR){
  let div = document.createElement("div");
  div.innerHTML = `[editor] ${txt}\n`;
  par.appendChild(div);
  par.scrollTop = par.scrollHeight; 
}
function putout(txt,par=CMR,sty=null){
  let auto = isAtBottom(par);
  let ps = txt.split('\n');
  for (let i = 0; i < ps.length; i++){
    let span;
    if (ps[i].length){
      span = document.createElement("span");
      if (sty) span.style = sty;
      span.innerHTML = ps[i];
      par.appendChild(span);
    }
    if (i == ps.length-1){
      if (auto) par.scrollTop = par.scrollHeight; 
    }else{
      par.appendChild(document.createElement("br"));
    }
  }
}

function runbin(pth, args=[]){

    // console.error(`stderr: ${data.toString()}`);

  });
  childProcess.on('close', (code, signal) => {
    let reason = `code ${code}`;

function parse_ins_print(txt){
  txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
  // txt = txt.replace(/\x1b\[[0-9;]*[mK]/g, '');
  txt = txt.replace(/\0/g, '');
  let lines = txt.split("\n");
  for (let i = lines.length-1; i > 0; i--){
    // let re = /[a-f0-9]{1,16} \(\d+:\d+\)\t.*/gm;
    let re = /[a-f0-9]{1,16} \x1b\[2m\(\d+:\d+\)\x1b\[0m\t.*/gm;
    if (re.test(lines[i])){
      continue;
    }else{
      lines[i-1] += '\n'+lines[i];
      lines.splice(i,1);
    }
  }
  let out = {};
  for (let i = 0; i < lines.length; i++){
    let words = lines[i].split(' ');
    let addr = words[0];
    let loc = words[1].split(')')[0].split('(')[1].split(':').map(x=>Number(x));
    let ins = lines[i].split('\t').slice(1)//.filter(x=>x.length);
    ins = ins.map(ansi_color);
    out[addr] = [loc,ins];
  }
  return out;
}

function ansi_color(txt){
  let cmap = {
    "2" : "#777",
    "31": "#d66",//red
    "32": "#ded",//green
    "33": "#ffb",//yellow
    "34": "#1bf",//blue
    "35": "#b9f",//magenta
    "36": "#6fdfcf",//cyan
    "94": "#1bf"
  }
  let state = 0;
  txt = txt.replace(/\x1b\[(\d+)m/g, function(m,n){
    let o = `<span style="color:${cmap[n]}">`;
    if (n == "0"){
      return `</span>`;
      state = 0;
    }else if (state == 0){
      state = 1;
      return o;
    }else{
      return `</span>`+o;
    }
  });
  if (state == 1){
    txt += `</span>`;
  }
  return txt;
}

function parse_vars_print(txt){
  let auto = isAtBottom(CMV);

  txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
  txt = txt.replace(/\x1b\[[0-9;]*[mK]/g, '');
  // txt = txt.replace(/\n/g, '</td></tr><tr><td>');
  // txt = txt.replace(/\t/g, '</td><td>');
  // txt = `<table><tr><td>`+txt+`</td></tr></table>`
  let splits = [
    "===============BEGIN===============",
    "================END================",
    "-----------------------------------"
  ]
  let lines = txt.split('\n').filter(x=>x.length);
  let hd = `<table style="font-size:12px;width:100%;border:1px solid #999;${lines.some(x=>!splits.includes(x))?"border-collapse:collapse;":""}">`;
  let out = `<div style="font-size:12px;font-weight:bold;color:#999">BOTTOM</div>`+hd;
  
  for (let i = lines.length-1; i > 0; i--){
    if (splits.includes(lines[i]) || lines[i].split('\t').length >= 4){
      continue;
    }else{
      lines[i-1] += '\n'+lines[i];
      lines.splice(i,1);
    }
  }
  for (let i = 0; i < lines.length; i++){
    if (splits.includes(lines[i])){
      if (lines[i] == splits[2]){
        out += `</table>`+`<div style="font-size:12px;font-weight:bold;color:#999">FRAME BOUNDARY</div>`+hd;
      }
      continue;
    }
    let cells = lines[i].split('\t');
    if (dofiltvar){
      if (cells[0].startsWith("__r_")) continue;
      if (cells[0].includes(".")){
        if (stdnames[cells[0].split(".")[0]]) continue;
      }
    }
    out += `<tr>`;
    if (['I8','U8','I16','U16','I32','U32','I64','U64','F32','F64','VEC'].includes(cells[1])){
      out += `<td class="tdbtn" style="color:#ded;border:1px solid #999" onmousedown="window.watchvar='${cells[0]}';window.watchabl=0;plot_var_print('${lines[i]}')">${cells[0]}</td>`;
    }else{
      out += `<td style="color:#ded;border:1px solid #999">${cells[0]}</td>`;
    }
    out += `<td style="color:#1bf;border:1px solid #999">${cells[1]}</td>`;
    out += `<td style="color:#b9f;border:1px solid #999">${cells.slice(3).join('\t')}</td>`;
    out += `</tr>`;
  }
  out += `</table>`;
  out += `<div style="font-size:12px;font-weight:bold;color:#999">TOP</div>`
  CMV.innerHTML = out;
  if (auto) CMV.scrollTop = CMV.scrollHeight; 
}

function make_color(idx){
  let jsr = idx+0x5EED;
  for (let i = 0; i < 10; i++){
    jsr^=(jsr<<17);
    jsr^=(jsr>>13);
    jsr^=(jsr<<5);
  }
  jsr = ((jsr>>>0) % 0xffffff);
  jsr |= 0x808080;
  return '#'+ (jsr.toString(16).padStart(6,'0'));
}

  </div>`

  if (!txt.trim().length){

      CMV.innerHTML = out;
    }
    return;
  }
  out += `<div style="font-size:10px;position:absolute;left:0px;top:0px;z-index:1000">`
  let rect = CMV.getBoundingClientRect();
  let pad = 10;

  }else{

  }
  out += `</div>`;

  let ymin = Infinity;
  let ymax = -Infinity;
  let xmax = 0;
  for (let k in watchdat){
    xmax = Math.max(xmax, watchdat[k].length);
    for (let i = 0; i < watchdat[k].length; i++){
      ymin = Math.min(ymin,watchdat[k][i]);
      ymax = Math.max(ymax,watchdat[k][i]);
    }
  }
  if (ymin == ymax){
    ymin -=1;
    ymax +=1;
  }
  let xsp = 4;
  xmax *= xsp;
  let xscale = 1;
  if (xmax < W-pad*2){
    xscale = (W-pad*2)/xmax;
    xmax = W-pad*2;
  }
  xmax += pad*2;

  function preq(maxAbs, minDiff) {
    let magnitude = Math.floor(Math.log10(maxAbs));
    let r = Math.ceil(magnitude - Math.log10(minDiff) + 2);
    return Math.min(Math.max(r,2),16);
  }
  let md = preq(Math.max(Math.abs(ymin),Math.abs(ymax)), (ymax-ymin)*0.1);

  out += `<div id="scroller" style="position:absolute;width:100%;height:100%;left:0px;top:0px;overflow:scroll">
    <svg id="scrollee" xmlns="http://www.w3.org/2000/svg" width="${xmax}" height="${H}" >`
  for (let i = 0; i < 10; i++){
    let y = (i/10)*(ymax-ymin)+ymin;
    let cy = H-pad-((y-ymin)/(ymax-ymin))*(H-pad*2);
    out += `<line x1="0" y1="${cy}" x2="${xmax}" y2="${cy}" stroke="#333"/>`;
    let yf = y.toPrecision(md);
    out += `<text x="${xmax}" y="${cy}" text-anchor="end" dominant-baseline="middle" font-size="10px" fill="#777">${yf}</text>`;
  }
  for (let k in watchdat){
    for (let i = 0; i < watchdat[k].length; i++){
      let y = watchdat[k][i];
      let cy = H-pad-((y-ymin)/(ymax-ymin))*(H-pad*2);
      out += `<circle cx="${i*xscale*xsp+pad}" cy="${cy}" r="1" fill="${colors[k]}"/>`;
    }
  }
  out += `</svg></div>`
  out += `<div id="watchdatcur" style="position:absolute;right:0px;bottom:0px;font-size:10px"></div>`;
  CMV.innerHTML = out;
  let a = CMV.querySelector("#scroller");
  let b = CMV.querySelector("#scrollee");
  a.scrollLeft = a.scrollWidth;
  function showcur(){
    let r = b.getBoundingClientRect();
    let x = mouseX - r.left - pad;
    let idx = Math.max(0,Math.round(x/xsp/xscale));
    let wc = [];
    for (let k in watchdat){
      idx = Math.min(watchdat[k].length-1,idx)
      wc.push(watchdat[k][idx]);
    }
    CMV.querySelector("#watchdatcur").innerHTML = `[${idx}]`+wc.join(",");
  }
  showcur();
  a.addEventListener("mousemove",showcur);
}

function clean_dbg_hl(){

function render_ins(){
  let out = document.createElement("div");
  for (let k in curinsmap){
    let loc = curinsmap[k][0];
    let div = document.createElement("div");
    div.id = k;
    if (loc[0]){
      div.style.opacity = 0.5
    }
    for (let i = 0; i < curinsmap[k][1].length; i++){
      let a = curinsmap[k][1][i];
      let span = document.createElement("span");
      span.style.display = "inline-block";
      if (i == 0){
        span.style.color = "#f6a";
      }
      span.innerHTML = a;
      let p = (i == 0)?6:12;
      let n = Math.ceil(span.innerText.length/p)*p;
      span.style.width = (n*10)+"px";
      div.appendChild(span)
    }
    out.appendChild(div);
  }
  CMI.innerHTML = "";
  CMI.appendChild(out);
}

function rundbg(pth, args=[]){
  dbgready = 10;
  watchabl = 0;
  watchvar = null;
  watchdat = {};
  set_mb_dbg();

  let firsttime = 1;
  putmsg(`invoking subprocess...`);

  childProcess = child_process.spawn(pth, args, {
    stdio: 'pipe',
    cwd: filename.split("/").slice(0,-1).join("/"),
  });
  let buf = "";
  childProcess.stdout.on('data', (data)=>{
    let txt = data.toString();
    buf += txt;
    // console.log(txt);
    if (dbgready == 20 || dbgready == 30 || dbgready == 0){
      txt = txt.replace(/\x1b\[94mdbg>\x1b\[0m/g,'');
      putout(txt);
    }

    if (buf.includes('\x1b[94mdbg>\x1b[0m')){
      if (dbgready == 10){
        childProcess.stdin.write("list\n");
        dbgready = 11;
      }else if (dbgready == 11){
        // console.log(buf);
        curinsmap = parse_ins_print(buf);
        // console.log(curinsmap);
        render_ins();
        parse_vars_print("");
        childProcess.stdin.write("peek\n");
        dbgready = 32;
      }else if (dbgready == 20 || dbgready == 30){
        if (watchvar == null){
          childProcess.stdin.write("dump\n");
        }else{
          childProcess.stdin.write(`dump ${watchvar}\n`);
          watchabl = 1;
        }
        dbgready ++;
      }else if (dbgready == 21 || dbgready == 31){
        if (watchvar == null || !watchabl){
          parse_vars_print(buf);
        }else{
          plot_var_print(buf);
        }
        childProcess.stdin.write("peek\n");
        dbgready ++;
      }else if (dbgready == 22 || dbgready == 32){
        // console.log(buf);
        let im = parse_ins_print(buf);
        let loc = Object.values(im)[0][0];
        let addr = Object.keys(im)[0];
        if (loc[0] == 0){
          let {line,ch} = CML.posFromIndex(loc[1]);
          hl_ins(addr);
          clean_dbg_hl();
          CML.addLineClass(line,"background","dbg-hl");
          prvmark = CML.markText({line,ch}, {line,ch:ch+1}, {
            className: "dbg-hhl"
          });
          CML.scrollIntoView({line,ch});
          prvhline = line;
          if (dbgready == 22){
            if (dbgsigpause == 1){
              dbgsigpause = 0;
              dbgready = 1;
            }else{
              if (addr == bp_addr){
                dbgready = 1;
              }else{
                childProcess.stdin.write("step\n");
                dbgready = 20;
              }
            }
          }else{
            dbgready = 1;
            if (firsttime){
              firsttime = 0;
              putmsg(`debugger session ready.`);
            }
          }
        }else{
          childProcess.stdin.write("step\n");
          dbgready-=2;
        }
        
      }else if (dbgready == 0){
        dbgready = 1;
      }

      buf = "";
      set_mb_dbg();
    }
  })
  childProcess.on('close', (code, signal) => {
    let reason = `code ${code}`;
    if (code === null){
      reason = `signal ${signal}`;
    }
    putmsg(`subprocess exited with ${reason}.`);
    clean_dbg_hl();
    unmark_bp();
    unhl_ins();
    dbgready = 0;
    set_mb_dbg();
    bp_addr = 0;
    childProcess = null;
  });
}

document.getElementById("btn-break").onclick = function(){
  if (bp_addr){
    unmark_bp();
    childProcess.stdin.write(`break 0\n`);
    putmsg(`breakpoint removed.`);
    bp_addr = null;
    dbgready = 0;
    return;
  }
  let {line,ch} = CML.getCursor();
  let idx = CML.indexFromPos({line,ch});
  let md = Infinity;
  let addr = null;
  let bidx = null;
  for (let k in curinsmap){
    let loc = curinsmap[k][0];
    if (loc[0] != 0) continue;
    let d = Math.abs(loc[1]-idx);
    if (d < md){
      md = d;
      bidx = loc[1];
      addr = k;
    }
  }
  if (addr == null){
    putmsg(`breakpoint insertion failed.`);
    dbgready = 0;
    return;
  }
  mark_bp(CML.posFromIndex(bidx));
  childProcess.stdin.write(`break ${addr}\n`);
  putmsg(`breakpoint inserted.`);
  dbgready = 0;
  bp_addr = addr;
}

function get_completions(prefix, before){
  // console.log(prefix,"|",before);
  let list = [];
  for (let k in API){
    let nmsp = k.split('-')[0];
    let name = k.split('-').slice(1).join('.');
    let tem;
    let sig;
    let com=nmsp;
    if (name){
      [name,tem,sig] = name.split(':');
      com += "."+name;
    }
    let arg;
    if (sig){
      sig = sig.replace(/\(/g,'[')
      sig = sig.replace(/\)/g,']')
      tem = tem.split("*");
      arg = sig.split("*");
    }
    let doc = `<i>`+API[k][0]+`</i>`;
    if (arg && arg.length){
      doc += `<table style="font-size: 13px; color:white">`;
      for (let i = 0; i < arg.length; i++){
        doc += `<tr style="vertical-align: top;"><td style="vertical-align: top;min-width:50px;color:#1bf;font-family:monospace">${arg[i]}</td><td style="vertical-align: top;">${API[k][1+i]}</td></tr>`
      }
      if (API[k][arg.length+1]){
        doc += `<tr style="vertical-align: top;"><td style="vertical-align: top;min-width:50px;color:#aaa;font-family:monospace">returns</td><td style="vertical-align: top;">${API[k].at(-1)}</td></tr>`
      }
      doc += `</table>`;
    }
    if (prefix.startsWith('.') && name){
      if (before.endsWith(nmsp) && name.startsWith(prefix.slice(1))){
        list.push({text:'.'+name, displayText:name, doc});
      }
    }else if (nmsp.startsWith(prefix) && prefix.length > 0){
      list.push({text:com, displayText:com, doc});
    }
  }
  return list;
}

CodeMirror.registerHelper("hint", "dither", function(cm) {
  const cursor = cm.getCursor();
  const token = cm.getTokenAt(cursor);
  const line = cm.getLine(cursor.line);
  const before = line.slice(0, cursor.ch);
  let prefix = token.string.trim();
  let from = CodeMirror.Pos(cursor.line, token.start);
  let to   = CodeMirror.Pos(cursor.line, cursor.ch);
  let list = get_completions(prefix,before.slice(0,-prefix.length));
  return { list, from, to };
});

CML.on("inputRead", function(cm, change) {
  if (!cm.state.completionActive && change.text[0]) {
    trigger_completion(cm);
  }
});

let docBox = null;
let docAnimationFrame = null;
function trigger_completion(cm) {
  cm.showHint({ hint: CodeMirror.hint.dither, completeSingle:false });
  if (!docBox) {
    docBox = document.createElement("div");
    docBox.style = `
      position: absolute;
      padding: 5px;
      max-width: 300px;
      border: 1px solid #666;
      background: #333;
      font-size: 13px;
      color: white;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
      z-index: 3000;
      font-family: sans-serif;
      border-radius: 3px;
    `;
    document.body.appendChild(docBox);
  }
  function updateDoc() {
    const widget = CML.state.completionActive;
    if (!widget) {
      if (docBox) docBox.style.display = "none";
      docAnimationFrame = null;
      return;
    }
    if (!widget.widget){
      if (docBox) docBox.style.display = "none";
      docAnimationFrame = requestAnimationFrame(updateDoc);
      return;
    }
    const selectedIndex = widget.widget.selectedHint;
    if (selectedIndex == null) return;
    const hintData = widget.data.list[selectedIndex];
    if (!hintData || !hintData.doc) {
      docBox.style.display = "none";
      return;
    }
    docBox.style.display = "block";
    docBox.innerHTML = hintData.doc;
    const rect = widget.widget.hints.getBoundingClientRect();
    docBox.style.left = rect.right + 4 + "px";
    docBox.style.top  = rect.top + "px";
    docAnimationFrame = requestAnimationFrame(updateDoc);
  }

  if (!docAnimationFrame) updateDoc();
  CML.on("endCompletion", function cleanup() {
    if (docBox) {
      docBox.remove();
      docBox = null;
    }
    if (docAnimationFrame) {
      cancelAnimationFrame(docAnimationFrame);
      docAnimationFrame = null;
    }
    CML.off("endCompletion", cleanup);
  });
}
